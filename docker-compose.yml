
services:
  app:
  build:
    context: .
    dockerfile: Dockerfile

  container_name: Docker-Python-Template-app

  working_dir: /app

  volumes:
    - .:/app
    - ~/.gitconfig:/root/.gitconfig:ro
    - ~/.ssh:/root/.ssh:ro

  environment:
    APP_NAME: Docker-Python-Template
    APP_ENV: Development
    PORT: 8000
    DEBUG: "true"
    ENVIRONMENT: local

  command: sleep infinity

  tty: true

  ports:
    - "8000:8000"

  api:
    build: .
    container_name: ${APP_NAME}-api
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  notebook:
    image: jupyter/base-notebook
    container_name: jupyter-notebook
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work