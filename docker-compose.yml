
services:
  app:
    build: .
    container_name: ${APP_NAME}-app
    volumes:
      - .:/app
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV}
      - DEBUG=${DEBUG}
    command: python src/app/main.py

  api:
    build: .
    container_name: ${APP_NAME}-api
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  notebook:
    image: jupyter/base-notebook
    container_name: jupyter-notebook
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work